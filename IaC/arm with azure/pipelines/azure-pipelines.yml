trigger:
  branches:
    include:
      - main
  paths:
    include:
      - IaC/arm with azure/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - IaC/arm with azure/**

parameters:
  - name: environment
    displayName: Target Environment
    type: string
    default: dev
    values:
      - dev
      - prod

variables:
  - group: iac-arm-azure-secrets           # Contains: AZURE_SUBSCRIPTION_ID
  - name: serviceConnection
    value: sc-arm-azure-${{ parameters.environment }}
  - name: templateFile
    value: IaC/arm with azure/infra/templates/main.json
  - name: parametersFile
    value: IaC/arm with azure/infra/parameters/${{ parameters.environment }}.parameters.json
  - name: deploymentLocation
    value: eastus
  - name: deploymentName
    value: arm-$(Build.BuildId)-${{ parameters.environment }}

stages:
  # ─────────────────────────────────────────────────────────────────
  # Stage 1: Validate – syntax + schema check, no Azure changes
  # ─────────────────────────────────────────────────────────────────
  - stage: Validate
    displayName: Validate ARM Templates
    jobs:
      - job: Validate
        displayName: az deployment sub validate
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Validate templates
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az deployment sub validate \
                  --location $(deploymentLocation) \
                  --template-file "$(templateFile)" \
                  --parameters "@$(parametersFile)" \
                  --name "$(deploymentName)-validate"

  # ─────────────────────────────────────────────────────────────────
  # Stage 2: WhatIf – preview changes and publish as artifact
  # ─────────────────────────────────────────────────────────────────
  - stage: WhatIf
    displayName: ARM What-If (Preview Changes)
    dependsOn: Validate
    jobs:
      - job: WhatIf
        displayName: az deployment sub what-if
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Run What-If and save output
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                mkdir -p "$(Build.ArtifactStagingDirectory)/what-if"

                az deployment sub what-if \
                  --location $(deploymentLocation) \
                  --template-file "$(templateFile)" \
                  --parameters "@$(parametersFile)" \
                  --name "$(deploymentName)-whatif" \
                  --output json \
                  > "$(Build.ArtifactStagingDirectory)/what-if/what-if-output.json"

                # Also show human-readable output in pipeline logs
                az deployment sub what-if \
                  --location $(deploymentLocation) \
                  --template-file "$(templateFile)" \
                  --parameters "@$(parametersFile)" \
                  --name "$(deploymentName)-whatif"

          - task: PublishBuildArtifacts@1
            displayName: Publish What-If output as artifact
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/what-if
              artifactName: arm-what-if-${{ parameters.environment }}-$(Build.BuildId)

  # ─────────────────────────────────────────────────────────────────
  # Stage 3: Deploy – requires approval gate on main branch only
  # The 'deployment' job type (not 'job') enables ADO Environment
  # approval checks. Configure approvers in:
  # Pipelines > Environments > <environment> > Approvals and checks
  # ─────────────────────────────────────────────────────────────────
  - stage: Deploy
    displayName: Deploy to ${{ parameters.environment }}
    dependsOn: WhatIf
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - deployment: DeployARM
        displayName: ARM Subscription Deployment
        # ADO Environment named 'dev' or 'prod' — configure approval gates there
        environment: ${{ parameters.environment }}
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Deploy ARM stack
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment sub create \
                        --location $(deploymentLocation) \
                        --template-file "$(templateFile)" \
                        --parameters "@$(parametersFile)" \
                        --name "$(deploymentName)" \
                        --output json

                - task: AzureCLI@2
                  displayName: Show deployment outputs
                  inputs:
                    azureSubscription: $(serviceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az deployment sub show \
                        --name "$(deploymentName)" \
                        --query "properties.outputs" \
                        --output table
