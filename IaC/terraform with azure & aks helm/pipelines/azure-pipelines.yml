trigger:
  branches:
    include:
      - main
  paths:
    include:
      - IaC/terraform with azure & aks helm/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - IaC/terraform with azure & aks helm/**

parameters:
  - name: environment
    displayName: Target Environment
    type: string
    default: dev
    values:
      - dev
      - prod
  - name: action
    displayName: Action
    type: string
    default: apply
    values:
      - apply
      - destroy

variables:
  - group: iac-aks-azure-backend           # BACKEND_SA_NAME, BACKEND_RG, BACKEND_CONTAINER
  - name: serviceConnection
    value: sc-aks-azure-${{ parameters.environment }}
  - name: tfWorkingDir
    value: IaC/terraform with azure & aks helm/infra
  - name: tfVarFile
    value: environments/${{ parameters.environment }}.tfvars
  - name: stateKey
    value: aks/${{ parameters.environment }}.tfstate
  - name: TF_IN_AUTOMATION
    value: 'true'

stages:
  # ─────────────────────────────────────────────────────────────────
  # Stage 1: Validate
  # ─────────────────────────────────────────────────────────────────
  - stage: Validate
    displayName: Terraform Validate
    jobs:
      - job: TfValidate
        displayName: terraform init + validate
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: '1.9.x'

          - task: AzureCLI@2
            displayName: terraform init + validate
            inputs:
              azureSubscription: $(serviceConnection)
              addSpnToEnvironment: true
              scriptType: bash
              workingDirectory: $(tfWorkingDir)
              scriptLocation: inlineScript
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                terraform init \
                  -backend-config="storage_account_name=$(BACKEND_SA_NAME)" \
                  -backend-config="container_name=$(BACKEND_CONTAINER)" \
                  -backend-config="key=$(stateKey)" \
                  -backend-config="resource_group_name=$(BACKEND_RG)" \
                  -reconfigure \
                  -input=false

                terraform validate

  # ─────────────────────────────────────────────────────────────────
  # Stage 2: Plan
  # Note: plan includes BOTH azurerm resources (AKS) AND helm_release
  # resources — they are planned together in a single `terraform plan`.
  # ─────────────────────────────────────────────────────────────────
  - stage: Plan
    displayName: Terraform Plan (AKS + Helm)
    dependsOn: Validate
    jobs:
      - job: TfPlan
        displayName: terraform plan
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: '1.9.x'

          - task: AzureCLI@2
            displayName: terraform plan
            inputs:
              azureSubscription: $(serviceConnection)
              addSpnToEnvironment: true
              scriptType: bash
              workingDirectory: $(tfWorkingDir)
              scriptLocation: inlineScript
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                terraform init \
                  -backend-config="storage_account_name=$(BACKEND_SA_NAME)" \
                  -backend-config="container_name=$(BACKEND_CONTAINER)" \
                  -backend-config="key=$(stateKey)" \
                  -backend-config="resource_group_name=$(BACKEND_RG)" \
                  -reconfigure \
                  -input=false

                terraform plan \
                  -var-file="$(tfVarFile)" \
                  -out="$(Build.ArtifactStagingDirectory)/tfplan" \
                  -input=false

          - task: PublishBuildArtifacts@1
            displayName: Publish plan artifact
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/tfplan
              artifactName: tfplan-aks-${{ parameters.environment }}-$(Build.BuildId)

  # ─────────────────────────────────────────────────────────────────
  # Stage 3: Apply — deploys AKS cluster + Helm releases in one apply
  # ─────────────────────────────────────────────────────────────────
  - stage: Apply
    displayName: Deploy AKS + Helm (${{ parameters.environment }})
    dependsOn: Plan
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        eq('${{ parameters.action }}', 'apply')
      )
    jobs:
      - deployment: TfApply
        displayName: terraform apply
        environment: aks-${{ parameters.environment }}
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: Install Terraform
                  inputs:
                    terraformVersion: '1.9.x'

                - task: DownloadBuildArtifacts@1
                  displayName: Download plan artifact
                  inputs:
                    buildType: current
                    artifactName: tfplan-aks-${{ parameters.environment }}-$(Build.BuildId)
                    downloadPath: $(System.ArtifactsDirectory)

                - task: AzureCLI@2
                  displayName: terraform apply (AKS + Helm)
                  inputs:
                    azureSubscription: $(serviceConnection)
                    addSpnToEnvironment: true
                    scriptType: bash
                    workingDirectory: $(tfWorkingDir)
                    scriptLocation: inlineScript
                    inlineScript: |
                      export ARM_CLIENT_ID=$servicePrincipalId
                      export ARM_CLIENT_SECRET=$servicePrincipalKey
                      export ARM_TENANT_ID=$tenantId
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                      terraform init \
                        -backend-config="storage_account_name=$(BACKEND_SA_NAME)" \
                        -backend-config="container_name=$(BACKEND_CONTAINER)" \
                        -backend-config="key=$(stateKey)" \
                        -backend-config="resource_group_name=$(BACKEND_RG)" \
                        -reconfigure \
                        -input=false

                      terraform apply \
                        -input=false \
                        "$(System.ArtifactsDirectory)/tfplan-aks-${{ parameters.environment }}-$(Build.BuildId)/tfplan"

  # ─────────────────────────────────────────────────────────────────
  # Stage 4: Verify — post-deploy checks using kubectl + helm
  # Demonstrates: retrieving kubeconfig in CI without storing it as artifact
  # ─────────────────────────────────────────────────────────────────
  - stage: Verify
    displayName: Post-Deploy Verification
    dependsOn: Apply
    condition: succeeded()
    jobs:
      - job: VerifyCluster
        displayName: kubectl + helm verify
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: Verify nodes and Helm releases
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                # Install kubectl + helm on the agent
                az aks install-cli --only-show-errors

                CLUSTER_NAME=$(az aks list \
                  --resource-group "rg-aksdemo-${{ parameters.environment }}-eastus" \
                  --query "[0].name" -o tsv)

                # Retrieve kubeconfig using SP from service connection (no --admin)
                az aks get-credentials \
                  --resource-group "rg-aksdemo-${{ parameters.environment }}-eastus" \
                  --name "$CLUSTER_NAME" \
                  --overwrite-existing

                echo "==> Waiting for all nodes to be Ready..."
                kubectl wait --for=condition=Ready nodes --all --timeout=180s

                echo "==> Verifying nginx-ingress deployment..."
                kubectl rollout status deployment/ingress-nginx-controller \
                  -n ingress-nginx --timeout=120s

                echo "==> Verifying cert-manager deployment..."
                kubectl rollout status deployment/cert-manager \
                  -n cert-manager --timeout=120s

                echo "==> All Helm releases:"
                helm list -A

                echo "==> Node status:"
                kubectl get nodes -o wide

  # ─────────────────────────────────────────────────────────────────
  # Stage 5: Destroy (manual trigger only)
  # ─────────────────────────────────────────────────────────────────
  - stage: Destroy
    displayName: Terraform Destroy (${{ parameters.environment }})
    dependsOn: Validate
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        eq('${{ parameters.action }}', 'destroy')
      )
    jobs:
      - deployment: TfDestroy
        displayName: terraform destroy
        environment: aks-${{ parameters.environment }}
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  inputs:
                    terraformVersion: '1.9.x'

                - task: AzureCLI@2
                  displayName: terraform destroy
                  inputs:
                    azureSubscription: $(serviceConnection)
                    addSpnToEnvironment: true
                    scriptType: bash
                    workingDirectory: $(tfWorkingDir)
                    scriptLocation: inlineScript
                    inlineScript: |
                      export ARM_CLIENT_ID=$servicePrincipalId
                      export ARM_CLIENT_SECRET=$servicePrincipalKey
                      export ARM_TENANT_ID=$tenantId
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                      terraform init \
                        -backend-config="storage_account_name=$(BACKEND_SA_NAME)" \
                        -backend-config="container_name=$(BACKEND_CONTAINER)" \
                        -backend-config="key=$(stateKey)" \
                        -backend-config="resource_group_name=$(BACKEND_RG)" \
                        -reconfigure \
                        -input=false

                      terraform destroy \
                        -var-file="$(tfVarFile)" \
                        -auto-approve \
                        -input=false
