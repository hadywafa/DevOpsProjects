trigger:
  branches:
    include:
      - main
  paths:
    include:
      - IaC/terraform with azure/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - IaC/terraform with azure/**

parameters:
  - name: environment
    displayName: Target Environment
    type: string
    default: dev
    values:
      - dev
      - prod
  - name: action
    displayName: Action
    type: string
    default: apply
    values:
      - apply
      - destroy

variables:
  - group: iac-tf-azure-backend            # BACKEND_SA_NAME, BACKEND_RG, BACKEND_CONTAINER
  - name: serviceConnection
    value: sc-tf-azure-${{ parameters.environment }}
  - name: tfWorkingDir
    value: IaC/terraform with azure/infra
  - name: tfVarFile
    value: environments/${{ parameters.environment }}.tfvars
  - name: stateKey
    value: networking/${{ parameters.environment }}.tfstate
  - name: TF_IN_AUTOMATION
    value: 'true'                           # disables interactive prompts in TF

stages:
  # ─────────────────────────────────────────────────────────────────
  # Stage 1: Validate — terraform init + validate (no plan, no changes)
  # addSpnToEnvironment injects: $servicePrincipalId, $servicePrincipalKey, $tenantId
  # ─────────────────────────────────────────────────────────────────
  - stage: Validate
    displayName: Terraform Validate
    jobs:
      - job: TfValidate
        displayName: terraform init + validate
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: '1.9.x'

          - task: AzureCLI@2
            displayName: terraform init + validate
            inputs:
              azureSubscription: $(serviceConnection)
              addSpnToEnvironment: true     # key: injects ARM_* env vars from service connection
              scriptType: bash
              workingDirectory: $(tfWorkingDir)
              scriptLocation: inlineScript
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                terraform init \
                  -backend-config="storage_account_name=$(BACKEND_SA_NAME)" \
                  -backend-config="container_name=$(BACKEND_CONTAINER)" \
                  -backend-config="key=$(stateKey)" \
                  -backend-config="resource_group_name=$(BACKEND_RG)" \
                  -reconfigure \
                  -input=false

                terraform validate

  # ─────────────────────────────────────────────────────────────────
  # Stage 2: Plan — produces a binary plan file published as artifact
  # The Apply stage downloads this EXACT artifact — guaranteeing
  # "what you saw is what will be applied" (no drift between stages).
  # ─────────────────────────────────────────────────────────────────
  - stage: Plan
    displayName: Terraform Plan
    dependsOn: Validate
    jobs:
      - job: TfPlan
        displayName: terraform plan
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: '1.9.x'

          - task: AzureCLI@2
            displayName: terraform plan
            inputs:
              azureSubscription: $(serviceConnection)
              addSpnToEnvironment: true
              scriptType: bash
              workingDirectory: $(tfWorkingDir)
              scriptLocation: inlineScript
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                terraform init \
                  -backend-config="storage_account_name=$(BACKEND_SA_NAME)" \
                  -backend-config="container_name=$(BACKEND_CONTAINER)" \
                  -backend-config="key=$(stateKey)" \
                  -backend-config="resource_group_name=$(BACKEND_RG)" \
                  -reconfigure \
                  -input=false

                terraform plan \
                  -var-file="$(tfVarFile)" \
                  -out="$(Build.ArtifactStagingDirectory)/tfplan" \
                  -input=false

          - task: PublishBuildArtifacts@1
            displayName: Publish plan artifact
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/tfplan
              artifactName: tfplan-${{ parameters.environment }}-$(Build.BuildId)

  # ─────────────────────────────────────────────────────────────────
  # Stage 3: Apply — downloads plan artifact and applies it
  # Uses 'deployment' job for ADO Environment approval gates.
  # Only runs on main branch and when action=apply.
  # ─────────────────────────────────────────────────────────────────
  - stage: Apply
    displayName: Terraform Apply (${{ parameters.environment }})
    dependsOn: Plan
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        eq('${{ parameters.action }}', 'apply')
      )
    jobs:
      - deployment: TfApply
        displayName: terraform apply
        environment: ${{ parameters.environment }}   # configure approval gates here in ADO UI
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: Install Terraform
                  inputs:
                    terraformVersion: '1.9.x'

                - task: DownloadBuildArtifacts@1
                  displayName: Download plan artifact
                  inputs:
                    buildType: current
                    artifactName: tfplan-${{ parameters.environment }}-$(Build.BuildId)
                    downloadPath: $(System.ArtifactsDirectory)

                - task: AzureCLI@2
                  displayName: terraform apply (plan artifact)
                  inputs:
                    azureSubscription: $(serviceConnection)
                    addSpnToEnvironment: true
                    scriptType: bash
                    workingDirectory: $(tfWorkingDir)
                    scriptLocation: inlineScript
                    inlineScript: |
                      export ARM_CLIENT_ID=$servicePrincipalId
                      export ARM_CLIENT_SECRET=$servicePrincipalKey
                      export ARM_TENANT_ID=$tenantId
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                      terraform init \
                        -backend-config="storage_account_name=$(BACKEND_SA_NAME)" \
                        -backend-config="container_name=$(BACKEND_CONTAINER)" \
                        -backend-config="key=$(stateKey)" \
                        -backend-config="resource_group_name=$(BACKEND_RG)" \
                        -reconfigure \
                        -input=false

                      terraform apply \
                        -input=false \
                        "$(System.ArtifactsDirectory)/tfplan-${{ parameters.environment }}-$(Build.BuildId)/tfplan"

  # ─────────────────────────────────────────────────────────────────
  # Stage 4 (optional): Destroy — requires action=destroy parameter
  # Included to show the destroy pattern; protect prod with branch policies.
  # ─────────────────────────────────────────────────────────────────
  - stage: Destroy
    displayName: Terraform Destroy (${{ parameters.environment }})
    dependsOn: Validate
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        eq('${{ parameters.action }}', 'destroy')
      )
    jobs:
      - deployment: TfDestroy
        displayName: terraform destroy
        environment: ${{ parameters.environment }}
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  inputs:
                    terraformVersion: '1.9.x'

                - task: AzureCLI@2
                  displayName: terraform destroy
                  inputs:
                    azureSubscription: $(serviceConnection)
                    addSpnToEnvironment: true
                    scriptType: bash
                    workingDirectory: $(tfWorkingDir)
                    scriptLocation: inlineScript
                    inlineScript: |
                      export ARM_CLIENT_ID=$servicePrincipalId
                      export ARM_CLIENT_SECRET=$servicePrincipalKey
                      export ARM_TENANT_ID=$tenantId
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                      terraform init \
                        -backend-config="storage_account_name=$(BACKEND_SA_NAME)" \
                        -backend-config="container_name=$(BACKEND_CONTAINER)" \
                        -backend-config="key=$(stateKey)" \
                        -backend-config="resource_group_name=$(BACKEND_RG)" \
                        -reconfigure \
                        -input=false

                      terraform destroy \
                        -var-file="$(tfVarFile)" \
                        -auto-approve \
                        -input=false
